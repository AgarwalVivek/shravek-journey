<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Shower — Shravek Journey</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/event.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Hero -->
  <section class="event-hero">
    <div class="event-hero__content">
      <span class="event-hero__emoji">👶🍼</span>
      <h1 class="event-hero__title" id="event-title">Baby Shower</h1>
      <p class="event-hero__date" id="event-date"></p>
      <p class="event-hero__desc" id="event-description"></p>
    </div>
  </section>

  <!-- Tabs -->
  <nav class="event-tabs">
    <button class="event-tab active" data-tab="rsvp">RSVP</button>
    <button class="event-tab" data-tab="registry">Gift Registry</button>
  </nav>

  <!-- RSVP Section -->
  <section class="event-section active" id="section-rsvp">
    <div class="container">
      <h2 class="section-title">RSVP</h2>
      <p class="section-subtitle">Let us know if you can make it! 💕</p>

      <form class="rsvp-form" id="rsvp-form">
        <div class="form-row">
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="rsvp-name" required placeholder="Full name" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="rsvp-email" required placeholder="you@email.com" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Number of Guests</label>
            <input type="number" id="rsvp-guests" min="1" max="10" value="1" required />
          </div>
          <div class="form-group">
            <label>Message (optional)</label>
            <input type="text" id="rsvp-message" placeholder="Congratulations!" />
          </div>
        </div>
        <button type="submit" class="btn btn--dark">Submit RSVP</button>
      </form>

      <div class="rsvp-success" id="rsvp-success" style="display:none">
        <span>🎉</span>
        <h3>Thank you!</h3>
        <p>Your RSVP has been received. We can't wait to see you!</p>
      </div>
    </div>
  </section>

  <!-- Registry Section -->
  <section class="event-section" id="section-registry">
    <div class="container">
      <h2 class="section-title">Gift Registry</h2>
      <p class="section-subtitle">Every little gift means the world to us 🎁</p>
      <div class="registry-grid" id="registry-grid">
        <p class="loading">Loading gifts...</p>
      </div>
    </div>
  </section>

  <!-- Claim Modal -->
  <div class="modal-overlay" id="claim-modal" style="display:none">
    <div class="modal-card">
      <h3>Claim this Gift</h3>
      <p id="claim-item-name"></p>
      <form id="claim-form">
        <input type="hidden" id="claim-item-id" />
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="claim-name" required />
        </div>
        <div class="form-group">
          <label>Your Email</label>
          <input type="email" id="claim-email" required />
        </div>
        <div style="display:flex;gap:1rem;margin-top:1rem">
          <button type="submit" class="btn btn--dark">Confirm</button>
          <button type="button" class="btn btn--outline" onclick="closeClaimModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/event.js"></script>
</body>
</html>
